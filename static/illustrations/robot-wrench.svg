<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none">
  <!-- Shadow -->
  <ellipse cx="140" cy="258" rx="70" ry="12" fill="#E8E0F0" opacity="0.5"/>
  
  <!-- Robot body -->
  <rect x="90" y="110" width="100" height="110" rx="24" fill="#E0E7FF" stroke="#A5B4FC" stroke-width="2"/>
  <rect x="94" y="114" width="92" height="102" rx="22" fill="none" stroke="white" stroke-width="3" opacity="0.5"/>
  
  <!-- Belly circle -->
  <circle cx="140" cy="165" r="22" fill="#C7D2FE" stroke="#A5B4FC" stroke-width="1.5"/>
  <circle cx="140" cy="165" r="18" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <!-- Belly button / power indicator -->
  <circle cx="140" cy="165" r="6" fill="#6366F1" opacity="0.7"/>
  <circle cx="138" cy="163" r="2" fill="white" opacity="0.6"/>
  
  <!-- Robot head -->
  <rect x="100" y="46" width="80" height="68" rx="20" fill="#E0E7FF" stroke="#A5B4FC" stroke-width="2"/>
  <rect x="104" y="50" width="72" height="60" rx="18" fill="none" stroke="white" stroke-width="3" opacity="0.5"/>
  
  <!-- Antenna -->
  <line x1="140" y1="46" x2="140" y2="28" stroke="#A5B4FC" stroke-width="3" stroke-linecap="round"/>
  <circle cx="140" cy="24" r="6" fill="#6EE7B7" stroke="#A5B4FC" stroke-width="1.5"/>
  <circle cx="138" cy="22" r="2" fill="white" opacity="0.6"/>
  
  <!-- Eyes -->
  <ellipse cx="122" cy="76" rx="11" ry="12" fill="#C7D2FE" stroke="#A5B4FC" stroke-width="1.5"/>
  <circle cx="124" cy="76" r="5" fill="#6366F1"/>
  <circle cx="126" cy="74" r="2" fill="white" opacity="0.8"/>
  
  <ellipse cx="158" cy="76" rx="11" ry="12" fill="#C7D2FE" stroke="#A5B4FC" stroke-width="1.5"/>
  <circle cx="160" cy="76" r="5" fill="#6366F1"/>
  <circle cx="162" cy="74" r="2" fill="white" opacity="0.8"/>
  
  <!-- Smile -->
  <path d="M125 96 Q140 108 155 96" stroke="#A5B4FC" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  
  <!-- Left arm -->
  <rect x="60" y="120" width="30" height="16" rx="8" fill="#E0E7FF" stroke="#A5B4FC" stroke-width="1.5"/>
  <rect x="62" y="122" width="26" height="12" rx="7" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Right arm holding wrench -->
  <rect x="190" y="110" width="30" height="16" rx="8" fill="#E0E7FF" stroke="#A5B4FC" stroke-width="1.5"/>
  <rect x="192" y="112" width="26" height="12" rx="7" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Wrench -->
  <g transform="translate(210, 80) rotate(30)">
    <!-- Handle -->
    <rect x="-4" y="10" width="8" height="44" rx="4" fill="#FCA5A5" stroke="#F87171" stroke-width="1.5"/>
    <rect x="-2" y="12" width="4" height="40" rx="3" fill="none" stroke="white" stroke-width="1" opacity="0.5"/>
    <!-- Head -->
    <path d="M-10 10 L10 10 L8 -4 Q0 -10 -8 -4 Z" fill="#FCA5A5" stroke="#F87171" stroke-width="1.5"/>
    <rect x="-2" y="-2" width="4" height="10" rx="2" fill="#E0E7FF"/>
  </g>
  
  <!-- Legs -->
  <rect x="112" y="220" width="18" height="30" rx="9" fill="#E0E7FF" stroke="#A5B4FC" stroke-width="1.5"/>
  <rect x="150" y="220" width="18" height="30" rx="9" fill="#E0E7FF" stroke="#A5B4FC" stroke-width="1.5"/>
  
  <!-- Feet -->
  <rect x="106" y="244" width="30" height="12" rx="6" fill="#C7D2FE" stroke="#A5B4FC" stroke-width="1.5"/>
  <rect x="144" y="244" width="30" height="12" rx="6" fill="#C7D2FE" stroke="#A5B4FC" stroke-width="1.5"/>
  
  <!-- Sparkles -->
  <g fill="#6366F1" opacity="0.5">
    <circle cx="55" cy="80" r="3"/>
    <circle cx="240" cy="60" r="2.5"/>
    <circle cx="50" cy="200" r="2"/>
  </g>
</svg>
