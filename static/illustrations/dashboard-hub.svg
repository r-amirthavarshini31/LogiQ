<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Shadow filters for Claymorphism volume -->
    <filter id="clay-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="5" flood-color="#1E1B3A" flood-opacity="0.12"/>
    </filter>
    <filter id="c-inset" x="-10%" y="-10%" width="120%" height="120%">
      <feOffset dx="1" dy="2"/>
      <feGaussianBlur stdDeviation="1" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="white" flood-opacity="0.6" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Background Decorative Circles -->
  <circle cx="200" cy="200" r="170" fill="#E8E0F0" opacity="0.4"/>
  <circle cx="200" cy="200" r="130" fill="#E0F2FE" opacity="0.6"/>

  <!-- Main Dashboard Clay Screen -->
  <g filter="url(#clay-shadow)">
    <rect x="60" y="90" width="280" height="220" rx="24" fill="#FFFFFF"/>
    <!-- Outer Clay Ring Overlay -->
    <rect x="60" y="90" width="280" height="220" rx="24" fill="none" stroke="#FFFFFF" stroke-width="6" filter="url(#c-inset)"/>
    <rect x="60" y="90" width="280" height="220" rx="24" fill="none" stroke="#6B6890" stroke-width="1" opacity="0.08"/>
  </g>

  <!-- Dashboard Top Bar -->
  <g transform="translate(60, 90)">
    <circle cx="24" cy="24" r="6" fill="#FCA5A5" />
    <circle cx="44" cy="24" r="6" fill="#FEF3C7" />
    <circle cx="64" cy="24" r="6" fill="#6EE7B7" />
    <rect x="90" y="20" width="80" height="8" rx="4" fill="#E8E0F0"/>
  </g>

  <!-- Left Sidebar Panel in Dashboard -->
  <g transform="translate(60, 130)">
    <rect x="15" y="10" width="40" height="8" rx="4" fill="#818CF8" opacity="0.8"/>
    <rect x="15" y="26" width="30" height="6" rx="3" fill="#E8E0F0"/>
    <rect x="15" y="40" width="35" height="6" rx="3" fill="#E8E0F0"/>
    <rect x="15" y="54" width="25" height="6" rx="3" fill="#E8E0F0"/>
  </g>

  <!-- Main Chart Area -->
  <g filter="url(#clay-shadow)" transform="translate(130, 130)">
    <rect x="10" y="10" width="180" height="150" rx="16" fill="#FAFAFA" />
    
    <!-- Grid Lines -->
    <line x1="20" y1="30" x2="180" y2="30" stroke="#E8E0F0" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="20" y1="65" x2="180" y2="65" stroke="#E8E0F0" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="20" y1="100" x2="180" y2="100" stroke="#E8E0F0" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="20" y1="135" x2="180" y2="135" stroke="#E8E0F0" stroke-width="1"/>

    <!-- Bar Chart Elements (Clay Style) -->
    <rect x="35" y="75" width="16" height="60" rx="8" fill="#FCA5A5" filter="url(#c-inset)"/>
    <rect x="65" y="45" width="16" height="90" rx="8" fill="#818CF8" filter="url(#c-inset)"/>
    <rect x="95" y="90" width="16" height="45" rx="8" fill="#6EE7B7" filter="url(#c-inset)"/>
    <rect x="125" y="60" width="16" height="75" rx="8" fill="#BAE6FD" filter="url(#c-inset)"/>
    <rect x="155" y="30" width="16" height="105" rx="8" fill="#FEF3C7" filter="url(#c-inset)"/>
  </g>

  <!-- Interactive Overlay Badge -->
  <g filter="url(#clay-shadow)" transform="translate(40, 230)">
    <rect x="0" y="0" width="110" height="60" rx="16" fill="#818CF8"/>
    <rect x="0" y="0" width="110" height="60" rx="16" fill="none" stroke="#FFFFFF" stroke-width="3" filter="url(#c-inset)"/>
    <circle cx="30" cy="30" r="14" fill="#FFFFFF" opacity="0.3"/>
    <path d="M26 30 l3 3 l5-6" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    <rect x="52" y="20" width="40" height="6" rx="3" fill="#FFFFFF"/>
    <rect x="52" y="32" width="25" height="5" rx="2.5" fill="#FFFFFF" opacity="0.7"/>
  </g>

  <!-- Floating Gear (Setup) -->
  <g filter="url(#clay-shadow)" transform="translate(300, 70)">
    <circle cx="25" cy="25" r="20" fill="#FEF3C7" />
    <circle cx="25" cy="25" r="20" fill="none" stroke="#FFFFFF" stroke-width="2" filter="url(#c-inset)"/>
    <circle cx="25" cy="25" r="8" fill="#FFFFFF" />
    <!-- teeth -->
    <rect x="22" y="2" width="6" height="6" rx="2" fill="#FEF3C7"/>
    <rect x="22" y="42" width="6" height="6" rx="2" fill="#FEF3C7"/>
    <rect x="2" y="22" width="6" height="6" rx="2" fill="#FEF3C7"/>
    <rect x="42" y="22" width="6" height="6" rx="2" fill="#FEF3C7"/>
  </g>
</svg>
