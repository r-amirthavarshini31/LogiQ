    <rect x="52" y="52" width="12" height="36" rx="6" fill="#C4B5D9" stroke="#A78BCA" stroke-width="2" transform="rotate(45 58 70)"/>
    <rect x="54" y="54" width="8" height="32" rx="5" fill="none" stroke="white" stroke-width="1.5" opacity="0.4" transform="rotate(45 58 70)"/>
  </g>
  
  <!-- Sparkle accents -->
  <g fill="#6366F1" opacity="0.6">
    <circle cx="50" cy="60" r="3"/>
    <circle cx="230" cy="80" r="2"/>
    <circle cx="45" cy="200" r="2.5"/>
    <circle cx="240" cy="180" r="3"/>
  </g>
  
  <defs>
    <linearGradient id="serverGrad" x1="70" y1="50" x2="190" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="white" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#C4B5D9" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
