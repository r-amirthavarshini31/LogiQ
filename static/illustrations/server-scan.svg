  <rect x="70" y="50" width="120" height="180" rx="16" fill="url(#serverGrad)" opacity="0.5"/>
  
  <!-- Inner shadow for clay effect -->
  <rect x="74" y="54" width="112" height="172" rx="14" fill="none" stroke="white" stroke-width="3" opacity="0.6"/>
  
  <!-- Server slots -->
  <rect x="88" y="70" width="84" height="28" rx="8" fill="#D5CEE5" stroke="#B8A9D4" stroke-width="1.5"/>
  <rect x="90" y="72" width="80" height="24" rx="7" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <circle cx="156" cy="84" r="5" fill="#6EE7B7"/>
  <circle cx="142" cy="84" r="5" fill="#6EE7B7" opacity="0.6"/>
  <rect x="96" y="80" width="30" height="3" rx="1.5" fill="#B8A9D4"/>
  <rect x="96" y="76" width="20" height="3" rx="1.5" fill="#B8A9D4"/>
  
  <rect x="88" y="108" width="84" height="28" rx="8" fill="#D5CEE5" stroke="#B8A9D4" stroke-width="1.5"/>
  <rect x="90" y="110" width="80" height="24" rx="7" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <circle cx="156" cy="122" r="5" fill="#FCA5A5"/>
  <circle cx="142" cy="122" r="5" fill="#6EE7B7" opacity="0.6"/>
  <rect x="96" y="118" width="30" height="3" rx="1.5" fill="#B8A9D4"/>
  <rect x="96" y="114" width="20" height="3" rx="1.5" fill="#B8A9D4"/>
  
  <rect x="88" y="146" width="84" height="28" rx="8" fill="#D5CEE5" stroke="#B8A9D4" stroke-width="1.5"/>
  <rect x="90" y="148" width="80" height="24" rx="7" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <circle cx="156" cy="160" r="5" fill="#6EE7B7"/>
  <circle cx="142" cy="160" r="5" fill="#BAE6FD"/>
  <rect x="96" y="156" width="30" height="3" rx="1.5" fill="#B8A9D4"/>
  <rect x="96" y="152" width="20" height="3" rx="1.5" fill="#B8A9D4"/>
  
  <rect x="88" y="184" width="84" height="28" rx="8" fill="#D5CEE5" stroke="#B8A9D4" stroke-width="1.5"/>
  <rect x="90" y="186" width="80" height="24" rx="7" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <circle cx="156" cy="198" r="5" fill="#6EE7B7"/>
  <circle cx="142" cy="198" r="5" fill="#6EE7B7" opacity="0.6"/>
  <rect x="96" y="194" width="30" height="3" rx="1.5" fill="#B8A9D4"/>
  <rect x="96" y="190" width="20" height="3" rx="1.5" fill="#B8A9D4"/>
  
  <!-- Magnifying glass -->
  <g transform="translate(165, 100)">
    <!-- Glass circle -->
    <circle cx="32" cy="32" r="30" fill="#BAE6FD" opacity="0.3" stroke="#6366F1" stroke-width="4"/>
    <circle cx="32" cy="32" r="26" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
    <!-- Reflection -->
