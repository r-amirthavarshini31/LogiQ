<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none">
  <!-- Background glow -->
  <ellipse cx="140" cy="250" rx="100" ry="16" fill="#E8E0F0" opacity="0.5"/>
  
  <!-- Server rack body -->
