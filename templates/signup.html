{% extends "base.html" %}

{% block title %}Sign Up — LogiQ{% endblock %}

{% block extra_css %}
<style>
.login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 120px);
    padding: var(--space-xl) var(--space-md);
}

.login-card {
    width: 100%;
    max-width: 460px;
    padding: var(--space-2xl);
    animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

.login-header {
    text-align: center;
    margin-bottom: var(--space-xl);
}

.login-icon-box {
    width: 60px;
    height: 60px;
    border-radius: 18px;
    background: var(--color-lavender);
    color: var(--color-primary);
    margin: 0 auto var(--space-md) auto;
    box-shadow: var(--shadow-clay-small);
}

.login-title {
    font-size: var(--font-size-2xl);
    font-weight: 800;
    margin-bottom: var(--space-xs);
}

.login-subtitle {
    font-size: var(--font-size-sm);
    color: var(--color-text-secondary);
}

.form-group {
    margin-bottom: var(--space-md);
}

.form-label {
    display: block;
    font-size: var(--font-size-xs);
    font-weight: 700;
    color: var(--color-text-secondary);
    margin-bottom: var(--space-xs);
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.login-error {
    background: var(--color-peach);
    color: var(--color-error-dark);
    padding: var(--space-sm) var(--space-md);
    border-radius: var(--radius-sm);
    font-size: var(--font-size-sm);
    margin-bottom: var(--space-lg);
    display: none;
    align-items: center;
    gap: var(--space-sm);
    box-shadow: var(--shadow-clay-small);
}

.auth-switch {
    text-align: center;
    margin-top: var(--space-lg);
    font-size: var(--font-size-sm);
    color: var(--color-text-secondary);
}
</style>
{% endblock %}

{% block content %}
<div class="login-container" style="max-width: 950px; margin: 0 auto; display: flex; align-items: center; justify-content: center; gap: var(--space-3xl); width: 100%;">
    <div class="login-graphic hide-mobile" style="flex: 1.1; text-align: center; max-width: 400px; margin-top: -20px;">
        <img src="{{ url_for('static', filename='illustrations/user-security.svg') }}" alt="User Access Security" style="width: 100%; height: auto;" class="animate-float">
    </div>
    
    <div class="clay-card login-card" style="flex: 1; min-width: 320px;">
        <div class="login-header">
            <div class="login-icon-box flex-center">
                <i data-lucide="user-plus" width="30" height="30"></i>
            </div>
            <h1 class="login-title">Create Account</h1>
            <p class="login-subtitle">Join LogiQ and automate your diagnostics</p>
        </div>

        <div class="login-error" id="signup-error-banner">
            <i data-lucide="alert-circle" width="18" height="18"></i>
            <span id="signup-error-message">Error creating account</span>
        </div>

        <form id="signup-form">
            <div class="form-group">
                <label class="form-label" for="username">Full Name</label>
                <input class="clay-input" type="text" id="username" placeholder="e.g., DevOps Dan" required autocomplete="name">
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Work Email</label>
                <input class="clay-input" type="email" id="email" placeholder="e.g., dan@company.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label class="form-label" for="role">Team Role</label>
                <select class="clay-input clay-select" id="role" required>
                    <option value="DevOps Engineer">DevOps Engineer</option>
                    <option value="SRE Analyst">SRE Analyst</option>
                    <option value="Security Auditor">Security Auditor</option>
                    <option value="Platform Engineer">Platform Engineer</option>
                    <option value="Fullstack Developer">Fullstack Developer</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="clay-input" type="password" id="password" placeholder="••••••••" required autocomplete="new-password">
            </div>

            <div class="form-group">
                <label class="form-label" for="confirm-password">Confirm Password</label>
                <input class="clay-input" type="password" id="confirm-password" placeholder="••••••••" required autocomplete="new-password">
            </div>

            <button type="submit" class="clay-btn clay-btn-primary" style="width: 100%; margin-top: var(--space-md);">
                <i data-lucide="user-plus" width="18" height="18"></i>
                Sign Up
            </button>
        </form>

        <div class="auth-switch">
            Already have an account? <a href="/login" style="font-weight: 700;">Sign In</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/signup.js') }}"></script>
{% endblock %}
